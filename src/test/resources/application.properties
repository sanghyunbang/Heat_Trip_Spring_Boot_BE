# =====================================================================
# 테스트 전용 설정.
# 외부 인프라(MySQL/AWS/OAuth 실제 키) 없이도 전체 ApplicationContext가
# 뜨도록 임베디드 H2 + 더미 시크릿을 제공한다. (CI에서 ./gradlew test 가능)
# 실제 비밀값은 절대 넣지 않는다 — 전부 비운영용 더미.
# =====================================================================

# --- Datasource: 임베디드 H2 (MySQL 미사용) ---
spring.datasource.url=jdbc:h2:mem:heattrip;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- JPA ---
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# --- JWT (더미) ---
jwt.secret=test-only-jwt-secret-please-override-0123456789-abcdef
jwt.expiration=3600000

# --- LLM recommender ---
llm.recommender.base-url=http://localhost:8000
llm.recommender.connect-timeout-ms=10000
llm.recommender.read-timeout-ms=120000
llm.recommender.max-in-mem-bytes=33554432

app.base-url=http://localhost:8080

# --- OAuth2 client registrations (더미) ---
spring.security.oauth2.client.registration.google.client-id=test-google-client-id
spring.security.oauth2.client.registration.google.client-secret=test-google-client-secret
spring.security.oauth2.client.registration.google.redirect-uri=${app.base-url}/login/oauth2/code/google
spring.security.oauth2.client.registration.google.scope=email,profile

spring.security.oauth2.client.registration.kakao.client-id=test-kakao-client-id
spring.security.oauth2.client.registration.kakao.client-secret=test-kakao-client-secret
spring.security.oauth2.client.registration.kakao.client-name=Kakao
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.redirect-uri=${app.base-url}/login/oauth2/code/kakao
spring.security.oauth2.client.registration.kakao.scope=profile_nickname,account_email
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post
spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id

spring.security.oauth2.client.registration.naver.client-id=test-naver-client-id
spring.security.oauth2.client.registration.naver.client-secret=test-naver-client-secret
spring.security.oauth2.client.registration.naver.client-name=Naver
spring.security.oauth2.client.registration.naver.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.naver.redirect-uri=${app.base-url}/login/oauth2/code/naver
spring.security.oauth2.client.registration.naver.scope=name,email
spring.security.oauth2.client.provider.naver.authorization-uri=https://nid.naver.com/oauth2.0/authorize
spring.security.oauth2.client.provider.naver.token-uri=https://nid.naver.com/oauth2.0/token
spring.security.oauth2.client.provider.naver.user-info-uri=https://openapi.naver.com/v1/nid/me
spring.security.oauth2.client.provider.naver.user-name-attribute=response

# --- Kakao local API (더미) ---
kakao.api.base-url=https://dapi.kakao.com
kakao.api.rest-key=test-kakao-rest-key

# --- Tour API (더미) ---
TOUR.API.SECRET=test-tour-api-secret

# --- AWS / S3 (더미) ---
cloud.aws.credentials.access-key=test-access-key
cloud.aws.credentials.secret-key=test-secret-key
cloud.aws.region.static=ap-northeast-2
cloud.aws.s3.bucket=test-bucket
cloud.aws.cloudfront.domain=https://cdn.example.local

# --- Spring AI (OpenAI) 더미: 키 미설정 시 컨텍스트 로딩 실패하므로 placeholder 제공 ---
spring.ai.openai.api-key=test-disabled-openai-key
spring.ai.openai.chat.options.model=gpt-4.1-mini

# --- Observability: 테스트 중 외부 알림 비활성화 ---
observability.slack.enabled=false
observability.openai.enabled=false
