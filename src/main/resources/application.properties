# spring.profiles.default=dev

spring.config.import=optional:file:./application-private.properties,optional:file:/config/application-private.properties

# application.properties shared defaults
llm.recommender.base-url=${LLM_RECOMMENDER_BASE_URL:http://localhost:8000}
llm.recommender.connect-timeout-ms=10000
llm.recommender.read-timeout-ms=120000
llm.recommender.max-in-mem-bytes=33554432


# Use safer public-operation defaults and open them only when explicitly needed.
server.error.include-message=${SERVER_ERROR_INCLUDE_MESSAGE:never}
server.error.include-binding-errors=${SERVER_ERROR_INCLUDE_BINDING_ERRORS:never}
server.error.include-stacktrace=${SERVER_ERROR_INCLUDE_STACKTRACE:never}

# Public-operation defaults: keep framework logs at INFO unless explicitly raised.
logging.level.org.springframework.web=${LOG_LEVEL_ORG_SPRINGFRAMEWORK_WEB:INFO}
logging.level.org.springframework.http.converter=${LOG_LEVEL_ORG_SPRINGFRAMEWORK_HTTP_CONVERTER:INFO}
logging.level.org.springframework.web.servlet.mvc.method.annotation=${LOG_LEVEL_ORG_SPRINGFRAMEWORK_WEB_MVC_METHOD:INFO}
logging.pattern.level=%5p [cid:%X{correlationId:-}]

# --- Public operation defaults ---
app.security.docs-public=${APP_SECURITY_DOCS_PUBLIC:false}
app.security.allowed-origins=${APP_SECURITY_ALLOWED_ORIGINS:http://localhost:8080,http://10.0.2.2:8080}
app.security.rate-limit.enabled=${APP_SECURITY_RATE_LIMIT_ENABLED:true}
app.security.rate-limit.ip-header=${APP_SECURITY_RATE_LIMIT_IP_HEADER:X-Forwarded-For}
app.security.rate-limit.window-seconds=${APP_SECURITY_RATE_LIMIT_WINDOW_SECONDS:60}
app.security.rate-limit.login-max-requests=${APP_SECURITY_RATE_LIMIT_LOGIN_MAX_REQUESTS:10}
app.security.rate-limit.curation-max-requests=${APP_SECURITY_RATE_LIMIT_CURATION_MAX_REQUESTS:30}
app.security.rate-limit.upload-max-requests=${APP_SECURITY_RATE_LIMIT_UPLOAD_MAX_REQUESTS:20}
app.security.rate-limit.feedback-max-requests=${APP_SECURITY_RATE_LIMIT_FEEDBACK_MAX_REQUESTS:30}
app.security.rate-limit.search-max-requests=${APP_SECURITY_RATE_LIMIT_SEARCH_MAX_REQUESTS:120}

# --- Observability ---
observability.enabled=true
observability.service-name=heat-trip-backend
observability.stacktrace-lines=25
observability.request-log-enabled=true

observability.rate-limit.enabled=true
observability.rate-limit.window-seconds=300

observability.slack.enabled=false
observability.slack.webhook-url=${SLACK_WEBHOOK_URL:}
observability.slack.channel=${SLACK_CHANNEL:#backend-alerts}
observability.slack.username=${SLACK_BOT_NAME:heat-trip-alert-bot}

observability.openai.enabled=true

# --- Spring AI (OpenAI) ---
spring.ai.openai.api-key=${OPENAI_API_KEY:disabled-local-placeholder}
spring.ai.openai.chat.options.model=${OPENAI_MODEL:gpt-4.1-mini}

# SQL ?? (??/??? ????? ? ???? ? ?)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE