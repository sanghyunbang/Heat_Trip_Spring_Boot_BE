# 기본 프로필은 dev. 운영은 환경변수로 SPRING_PROFILES_ACTIVE=prod 설정
# spring.profiles.default=dev

# 로컬/운영에서 "있으면" 읽어들이는 프라이빗 파일들 (둘 다 optional)
#  - 로컬: 현재 작업 디렉터리의 ./application-private.properties
#  - 운영(도커): /config 마운트에 있는 application-private.properties
spring.config.import=optional:file:./application-private.properties,optional:file:/config/application-private.properties

# 공통 설정
server.port=${SERVER_PORT:8080}


# LLM(FastAPI) 연결 설정 – 기본값(개발편의) + 환경변수로 오버라이드
llm.recommender.base-url=${LLM_RECOMMENDER_BASE_URL:http://localhost:8000}
llm.recommender.connect-timeout-ms=${LLM_CONNECT_TIMEOUT_MS:2000}
llm.recommender.read-timeout-ms=${LLM_READ_TIMEOUT_MS:5000}