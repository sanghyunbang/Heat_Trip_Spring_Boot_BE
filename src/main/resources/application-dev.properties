# Development profile.
# Load local .env values when present. Real secrets must stay out of Git.
spring.config.import=optional:file:./.env[.properties],optional:file:/config/.env[.properties]

server.port=${SERVER_PORT:8080}
app.base-url=${APP_BASE_URL:http://10.0.2.2:8080}

# --- datasource ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/${MYSQL_DATABASE:heat_trip_db}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${MYSQL_USER:root}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${MYSQL_PASSWORD:}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA ---
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.MySQLDialect}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}

# --- JWT ---
jwt.secret=${JWT_SECRET:dev-only-change-me-dev-only-change-me-dev-only-change-me-1234567890}
jwt.expiration=${JWT_EXPIRATION:3600000}

# --- OAuth2 ---
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:dev-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:dev-google-client-secret}
spring.security.oauth2.client.registration.google.redirect-uri=${app.base-url}/login/oauth2/code/google
spring.security.oauth2.client.registration.google.scope=email,profile

spring.security.oauth2.client.registration.kakao.client-id=${KAKAO_CLIENT_ID:dev-kakao-client-id}
spring.security.oauth2.client.registration.kakao.client-secret=${KAKAO_CLIENT_SECRET:dev-kakao-client-secret}
spring.security.oauth2.client.registration.kakao.client-name=Kakao
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.redirect-uri=${app.base-url}/login/oauth2/code/kakao
spring.security.oauth2.client.registration.kakao.scope=profile_nickname,account_email
spring.security.oauth2.client.registration.kakao.client-authentication-method=client_secret_post

spring.security.oauth2.client.provider.kakao.authorization-uri=https://kauth.kakao.com/oauth/authorize
spring.security.oauth2.client.provider.kakao.token-uri=https://kauth.kakao.com/oauth/token
spring.security.oauth2.client.provider.kakao.user-info-uri=https://kapi.kakao.com/v2/user/me
spring.security.oauth2.client.provider.kakao.user-name-attribute=id

spring.security.oauth2.client.registration.naver.client-id=${NAVER_CLIENT_ID:dev-naver-client-id}
spring.security.oauth2.client.registration.naver.client-secret=${NAVER_CLIENT_SECRET:dev-naver-client-secret}
spring.security.oauth2.client.registration.naver.client-name=Naver
spring.security.oauth2.client.registration.naver.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.naver.redirect-uri=${app.base-url}/login/oauth2/code/naver
spring.security.oauth2.client.registration.naver.scope=name,email

spring.security.oauth2.client.provider.naver.authorization-uri=https://nid.naver.com/oauth2.0/authorize
spring.security.oauth2.client.provider.naver.token-uri=https://nid.naver.com/oauth2.0/token
spring.security.oauth2.client.provider.naver.user-info-uri=https://openapi.naver.com/v1/nid/me
spring.security.oauth2.client.provider.naver.user-name-attribute=response

# --- Kakao local API ---
kakao.api.base-url=${KAKAO_API_BASE_URL:https://dapi.kakao.com}
kakao.api.rest-key=${KAKAO_REST_API_KEY:dev-kakao-rest-key}

# --- Backfill ---
backfill.kakao.enabled=${BACKFILL_KAKAO_ENABLED:false}
backfill.kakao.sort=${BACKFILL_KAKAO_SORT:distance}
backfill.kakao.radius=${BACKFILL_KAKAO_RADIUS:20000}
backfill.kakao.max-distance-m=${BACKFILL_KAKAO_MAX_DISTANCE_M:800}
backfill.kakao.page-size=${BACKFILL_KAKAO_PAGE_SIZE:200}
backfill.kakao.delay-ms=${BACKFILL_KAKAO_DELAY_MS:250}

# --- Tour API ---
TOUR.API.SECRET=${TOUR_API_SECRET:dev-tour-api-secret}

# --- AWS / S3 ---
cloud.aws.credentials.access-key=${AWS_ACCESS_KEY_ID:dev-access-key}
cloud.aws.credentials.secret-key=${AWS_SECRET_ACCESS_KEY:dev-secret-key}
cloud.aws.region.static=${AWS_REGION:ap-northeast-2}
cloud.aws.s3.bucket=${AWS_S3_BUCKET:dev-bucket}
cloud.aws.cloudfront.domain=${AWS_CLOUDFRONT_DOMAIN:https://cdn.example.local}
