# Example only
# Created: 2026-03-18 00:54:24 +09:00
# Adjust upstream, domain, TLS, and thresholds before real use.

upstream heat_trip_backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

# Per-IP request buckets
limit_req_zone $binary_remote_addr zone=login_zone:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=curation_zone:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=search_zone:10m rate=120r/m;
limit_req_zone $binary_remote_addr zone=upload_zone:10m rate=20r/m;

server {
    listen 80;
    server_name example.com;

    client_max_body_size 20m;

    location /auth/login {
        limit_req zone=login_zone burst=5 nodelay;
        proxy_pass http://heat_trip_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/curation/ {
        limit_req zone=curation_zone burst=10 nodelay;
        proxy_pass http://heat_trip_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/explore/places/search {
        limit_req zone=search_zone burst=30 nodelay;
        proxy_pass http://heat_trip_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /media {
        limit_req zone=upload_zone burst=10 nodelay;
        proxy_pass http://heat_trip_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /journeys/v2/entries/with-images {
        limit_req zone=upload_zone burst=5 nodelay;
        proxy_pass http://heat_trip_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://heat_trip_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
