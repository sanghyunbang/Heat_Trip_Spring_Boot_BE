services:
  app:
    build: .
    container_name: heattrip-backend
    # SPRING_PROFILES_ACTIVE 사용 안 함 (두 파일만으로 운영)
    environment:
      - SERVER_ADDRESS=0.0.0.0
      # 나머지 값은 /config/application-private.properties 에서 읽힘
    ports:
      - "127.0.0.1:8080:8080"     # 외부/LAN 직접 접근 불가 (루프백만)
    depends_on:
      - mysql
    volumes:
      - ./config:/config          # 서버용 private 파일 마운트 (중요)
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: heattrip-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: heat_trip_db
      MYSQL_USER: heattrip
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command: >
      mysqld --character-set-server=utf8mb4 --collation-server=utf8mb4_0900_ai_ci --max_allowed_packet=16777216
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    ports:
      - "127.0.0.1:3306:3306"     # 로컬에서만 접속
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$$MYSQL_USER -p$$MYSQL_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  mysql_data:
